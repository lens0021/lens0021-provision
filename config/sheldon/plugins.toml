# sheldon plugin manifest. Used as the plugins.toml hardlink target on
# Windows (and any other host that wires sheldon up). Apply:
#
#   eval "$(sheldon source)"   # sourced from ~/.bashrc
#
# https://sheldon.cli.rs/

shell = "bash"

[plugins]

[plugins.abbrev-alias]
github = "lens0021/amber-abbrev-alias"
use = ["abbrev-alias.plugin.bash"]

[plugins.fzf-tab-completion]
github = "lincheney/fzf-tab-completion"
use = ["bash/fzf-bash-completion.sh"]

[plugins.claude-completion]
github = "cldotdev/claude-bash-completion"
use = ["claude-completion.bash"]
